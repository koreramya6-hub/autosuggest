<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeingInfinity</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Georgia, serif;
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
    position:relative;
}

/* Top Left Dot */
.dot{
    position:absolute;
    top:20px;
    left:20px;
    width:10px;
    height:10px;
    background:#444;
    border-radius:50%;
    position:fixed;
}

/* Top Right */
.top-right{
    position:fixed;
    top:20px;
    right:25px;
    font-size:18px;
    color:#444;
}

/* Heading */
h1{
    font-size:65px;
    margin-bottom:20px;
}

.being{
    color:#8566ff;
}

.infinity{
    color:#000;
}

/* Tagline */
.tagline{
    color:#555;
    font-size:24px;
    margin-bottom:35px;
}

/* Search Box */
.search{
    width:560px;
    margin:auto;
    position:relative;
}

.search-icon{
    position:absolute;
    left:18px;
    top:25px;
    transform:translateY(-50%);
    font-size:22px;
}

.search input{
    width:100%;
    height:52px;
    border:3px solid #555;
    border-radius:35px;
    outline:none;
    font-size:20px;
    padding-left:55px;
    font-family:Georgia, serif;
}

.search input::placeholder{
    color:#555;
}

/* Suggestion Box */
.suggestion-box{
    width:95%;
    height:34px;
    margin:0 auto;
    border:2px solid #777;
    border-top:none;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
    color:#444;
    background:#fff;
}

/* Hover */
.search input:focus{
    border-color:#9966ff;
}

</style>
</head>

<body>

<div class="dot"></div>

<div class="top-right">
    ● online &nbsp; | &nbsp; 🕒 &nbsp; -ms
</div>

<div class="container">

    <h1>
        <span class="being">Being</span><span class="infinity">Infinity</span>
    </h1>

    <p class="tagline">
        One million phrases. Four Algorithms. Prefix Based Auto Suggest.
    </p>

    <div class="search">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Start Typing to search">
    </div>

</div>

</body>
</html>
