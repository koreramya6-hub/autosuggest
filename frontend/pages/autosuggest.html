<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Being Infinity</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Georgia, serif;
    background:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#container{
    width:900px;
    border:3px solid brown;
    border-radius:15px;
    padding:20px;
}

#header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

#left{
    font-size:22px;
}

#right{
    font-size:22px;
}

#content{
    text-align:center;
    margin-top:20px;
}

#title h1{
    font-size:60px;
    margin-bottom:25px;
}

#description{
    font-size:22px;
    margin-bottom:30px;
}

#search{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
}

#searchIcon{
    font-size:28px;
}

#searchBox input{
    width:320px;
    height:40px;
    font-size:20px;
    padding-left:10px;
}

#footer{
    margin-top:40px;
    font-size:18px;
}

</style>

</head>
<body>

<div id="container">

    <div id="header">

        <div id="left">
            ⚙
        </div>

        <div id="right">
            ● online |
            🕒
            - ms
        </div>

    </div>

    <div id="content">

        <div id="title">
            <h1>Being Infinity</h1>
        </div>

        <div id="description">
            <p>
                One million phrases, Four algorithms,
                Prefix Based Auto Suggest.
            </p>
        </div>

        <div id="search">

            <div id="searchIcon">
                🔍
            </div>

            <div id="searchBox">
                <input
                    type="text"
                    placeholder="Start typing to search phrases">
            </div>

        </div>

    </div>

</div>

</body>
</html>
